name: Refresh Static Data

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate static JSON data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/static-data/refresh-static-data.mjs
          test -f public/data/exercises.json
          test -f public/data/release-notes.json

      - name: Manual mode info
        run: |
          echo "Manual utility workflow: snapshots are generated for validation only."
          echo "No automatic commit/push is performed by this workflow."
