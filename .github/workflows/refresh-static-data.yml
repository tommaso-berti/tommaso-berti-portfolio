name: Refresh Static Data

on:
  push:
    branches:
      - main
    paths-ignore:
      - "public/data/**"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch tags
        run: git fetch --tags --force

      - name: Generate static JSON data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          node scripts/static-data/refresh-static-data.mjs
          test -f public/data/exercises.json
          test -f public/data/release-notes.json

      - name: Commit static data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/exercises.json public/data/release-notes.json
          if git diff --cached --quiet; then
            echo "No static data changes."
          else
            git commit -m "chore(data): refresh static github snapshots [skip ci]"
            git push origin main
          fi
